<!--
  TODO: the bidder live-video player needs two scripts that the local
  index.html loads inline:
    1. <script src="https://demo.nanocosmos.de/nanoplayer/api/release/nanoplayer.5.min.js"></script>
    2. <script src="nano-player-6eea9249.js"></script>  (custom element wrapping the SDK)

  Both must be available before Elm's first render so any <nano-player>
  elements get upgraded immediately. The CDN bundle at
  https://cdn.circuitauction.com/stable/live/app-loader.js is built
  outside this repo and needs to be updated to include them.

  The CDN bundle also needs to load `version.js` (generated by
  scripts/write-version.js into dist/version.js during `npm run publish`)
  before app.js so the topBar can display the build version.
-->
<script src="https://cdn.circuitauction.com/stable/live/app-loader.js"></script>
